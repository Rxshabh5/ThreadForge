services:
  - type: web
    name: threadforge-node-backend
    runtime: node
    rootDir: node-backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false

  - type: web
    name: threadforge-spring-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: NODE_BACKEND_URL
        value: https://threadforge-node-backend.onrender.com

  - type: web
    name: threadforge-gateway
    runtime: python
    rootDir: gateway
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SPRING_BOOT_URL
        value: https://threadforge-spring-backend.onrender.com
      - key: NODE_BACKEND_URL
        value: https://threadforge-node-backend.onrender.com

  - type: web
    name: threadforge-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://threadforge-gateway.onrender.com
